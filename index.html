<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福满家 订单系统 - 带库存管理</title>
<style>
body { font-family: Arial; max-width:650px; margin:auto; padding:20px; background:#f9f9f9;}
h2 { text-align:center; color:#8B0000;}
h3 { background:#eee; padding:8px; border-left:4px solid #8B0000; margin-top:20px;}
input, select { width:100%; padding:10px; margin:5px 0; box-sizing:border-box; border:1px solid #ddd; border-radius:5px;}
.product { border-bottom:1px solid #eee; padding:12px 5px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;}
.product-name { flex:2; font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:8px;}
.product-name:hover { color:#8B0000; text-decoration:underline; }
.stock-badge { font-size:12px; background:#f0f0f0; padding:2px 6px; border-radius:10px; color:#666; }
.stock-badge.low { background:#ffcccc; color:#cc0000; }
.stock-badge.out { background:#ff9999; color:#990000; }
.product-price { flex:1; color:#666; font-size:14px;}
.product-qty { flex:1; min-width:100px;}
.product-qty input { width:80px; padding:8px; text-align:center;}
button { width:100%; padding:12px; background:#8B0000; color:white; border:none; font-size:18px; cursor:pointer; border-radius:5px; margin-top:10px;}
button:disabled { background:gray; cursor:not-allowed;}
.total { background:#fff3e0; padding:15px; border-radius:8px; margin:15px 0;}
.total-item { display:flex; justify-content:space-between; margin:8px 0;}
.total-item b { font-size:20px; color:#8B0000;}
.qty-group { display:flex; align-items:center; gap:8px; background:#f0f0f0; padding:5px 10px; border-radius:8px; }
.qty-group button { width:30px; background:#ddd; color:#333; margin:0; padding:5px; font-size:16px; }
.qty-group input { width:60px; text-align:center; margin:0; padding:5px; }
.stock-loading { font-size:12px; color:#999; margin-left:8px; }
</style>
</head>
<body>

<h2>福满家 订单系统</h2>

<h3>📋 客户资料</h3>
<input id="name" placeholder="姓名 *">
<input id="phone" placeholder="联络号码 *">
<input id="address" placeholder="地址 *">

<h3>🚚 配送方式</h3>
<select id="delivery" onchange="calc()">
  <option value="自取">自取</option>
  <option value="邮寄">邮寄</option>
</select>
<p><b>自取地址：</b>9, Jalan Perdagangan 1, Taman Universiti, 81300, Skudai, Johor.</p >

<!-- 熟肉商品 -->
<h3>🍖 商品列表 <span style="font-size:12px; font-weight:normal;">(点击商品名查看库存)</span></h3>
<div id="cookedProducts"></div>

<h3>📝 备注</h3>
<input id="remark" placeholder="备注（可选）">

<h3>🖼️ 上传付款截图 *</h3>
<input type="file" id="payment" accept="image/*">

<div class="total">
    <div class="total-item">商品总计：RM <span id="productTotal">0</span></div>
    <div class="total-item">运费：RM <span id="shipping">0</span></div>
    <div class="total-item"><b>总计：RM <span id="total">0</span></b></div>
</div>

<button id="submitBtn">提交订单</button>

  <script>
// ======================== 配置 ========================
// ⚠️ 请替换成你部署后的 Apps Script URL
const API_URL = "https://script.google.com/macros/s/AKfycbwLTjiqX6iXVdxk_CPBnSXKdXBwoIz-beN1-TCvrczne6K15oXVDgRrEZO8Dk74W-WXBQ/exec";

// ========== 商品数据 ==========
const cookedProducts = [
  { name: "猪肉碎肉干 Pork Meat (Minced Meat)", price500: 55, price1kg: 108 },
  { name: "鸡肉碎肉干 Chicken Meat (Minced Meat)", price500: 55, price1kg: 108 },
  { name: "切片肉干 BBQ Sliced Pork Meat", price500: 70, price1kg: 138 },
  { name: "帝王肉干 Signature BBQ Bacon", price500: 95, price1kg: 188 },
  { name: "精品肉松 Pork Floss", price: 30, unit: "200G/Tin", isFixed: true },
  { name: "黄金辣味虾米卷 Spicy Spring Roll", price: 22, unit: "220G/Tin", isFixed: true },
  { name: "炭烧鸡蛋饼 Traditional Kuih Kapit", price: 30, unit: "340G/Tin", isFixed: true },
  { name: "咸蛋鱼皮 Salted Egg Fish Skin", price: 23, unit: "100G/Pkt", isFixed: true },
  { name: "麻辣鱼皮 Mala Fish Skin", price: 23, unit: "100G/Pkt", isFixed: true }
];

// 判断是否为肉干类商品（需要换算1KG=2包500G）
function isMeatProduct(productName) {
    return productName.includes("肉干") || productName.includes("Meat") || productName.includes("Bacon");
}

// ========== 库存API函数 ==========

// 查询单个商品库存（统一用500G为单位）
async function fetchStock(productName, variant) {
    try {
        // 肉干类商品统一用 _500g 后缀查询
        let searchId = productName;
        if (isMeatProduct(productName)) {
            searchId = `${productName}_500g`;
        }
        
        const url = `${API_URL}?action=getStock&productId=${encodeURIComponent(searchId)}`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.success) {
            let rawStock = data.stock;  // 这是500G包装的pkt数
            
            // 如果是查询1KG规格，需要换算显示
            if (variant === "1KG") {
                let available1kg = Math.floor(rawStock / 2);
                return { 
                    available: available1kg > 0, 
                    stock: available1kg,
                    rawStock: rawStock
                };
            }
            
            // 500G或其他固定包装
            return { 
                available: rawStock > 0, 
                stock: rawStock,
                rawStock: rawStock
            };
        } else {
            // 商品未在库存表中找到，默认允许下单（假设无限库存）
            console.warn(`商品 "${productName}" 未在库存表中找到`);
            return { available: true, stock: 999, rawStock: 999 };
        }
    } catch (error) {
        console.error("查询库存失败:", error);
        return { available: true, stock: 0, error: true };
    }
}

// 扣减库存（根据规格自动换算）
async function deductStock(productName, quantity, variant) {
    try {
        // 计算实际要扣的500G pkt数
        let actualPkts = quantity;
        
        // 肉干类：1KG需要扣2 pkt
        if (isMeatProduct(productName) && variant === "1KG") {
            actualPkts = quantity * 2;
        }
        
        // 统一用500g后缀的ID去扣库存
        let productId = productName;
        if (isMeatProduct(productName)) {
            productId = `${productName}_500g`;
        }
        
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                action: "deductStock",
                productId: productId,
                quantity: actualPkts
            })
        });
        
        const data = await response.json();
        return data.success;
    } catch (error) {
        console.error("扣减库存失败:", error);
        return false;
    }
}

// 显示库存弹窗（供顾客点击查询）
async function showStockDialog(productName, variant) {
    let displayName = productName;
    if (variant && variant !== "500G/1KG") {
        displayName = `${productName} (${variant})`;
    }
    
    alert(`🔍 正在查询 ${displayName} 的库存...`);
    
    const stockInfo = await fetchStock(productName, variant);
    
    if (stockInfo.error) {
        alert(`⚠️ 无法获取 ${displayName} 的库存信息，请稍后再试或联系客服。`);
    } else if (stockInfo.available && stockInfo.stock > 0) {
        if (variant === "1KG" && isMeatProduct(productName)) {
            alert(`✅ ${displayName}\n📦 剩余库存：${stockInfo.stock} 包 (1KG)\n📦 相当于 ${stockInfo.rawStock} 包 500G\n\n可以正常下单！`);
        } else {
            alert(`✅ ${displayName}\n📦 剩余库存：${stockInfo.stock} 个\n\n可以正常下单！`);
        }
    } else {
        alert(`❌ ${displayName}\n📦 库存不足，暂时无法下单！\n\n请选择其他商品或联系客服。`);
    }
}

// 检查所有选购商品的库存（下单前调用）
async function checkAllStock() {
    let productsToCheck = [];
    
    cookedProducts.forEach((p, i) => {
        if (p.isFixed) {
            let qty = parseInt(document.getElementById(`cooked_${i}`).value) || 0;
            if (qty > 0) {
                productsToCheck.push({
                    name: p.name,
                    variant: p.unit,
                    qty: qty,
                    isMeat: isMeatProduct(p.name)
                });
            }
        } else {
            let qty500 = parseInt(document.getElementById(`cooked_${i}_500`).value) || 0;
            let qty1kg = parseInt(document.getElementById(`cooked_${i}_1kg`).value) || 0;
            if (qty500 > 0) {
                productsToCheck.push({
                    name: p.name,
                    variant: "500G",
                    qty: qty500,
                    isMeat: true
                });
            }
            if (qty1kg > 0) {
                productsToCheck.push({
                    name: p.name,
                    variant: "1KG",
                    qty: qty1kg,
                    isMeat: true
                });
            }
        }
    });
    
    if (productsToCheck.length === 0) {
        alert("请至少选择一件商品");
        return false;
    }
    
    // 逐个检查库存
    for (let item of productsToCheck) {
        const stockInfo = await fetchStock(item.name, item.variant);
        
        if (stockInfo.error) {
            alert(`⚠️ 无法验证 ${item.name} ${item.variant} 的库存，请稍后再试`);
            return false;
        }
        
        // 计算需要的pkt数
        let requiredPkts = item.qty;
        if (item.isMeat && item.variant === "1KG") {
            requiredPkts = item.qty * 2;
        }
        
        // 检查是否足够
        if (stockInfo.rawStock < requiredPkts) {
            let maxAvailable = stockInfo.rawStock;
            let unitText = "个";
            if (item.isMeat && item.variant === "1KG") {
                maxAvailable = Math.floor(stockInfo.rawStock / 2);
                unitText = "包 (1KG)";
            }
            alert(`❌ ${item.name} ${item.variant}\n需求数量：${item.qty}\n最多可售：${maxAvailable} ${unitText}\n\n库存不足，无法下单！`);
            return false;
        }
    }
    
    return true;
}

// 批量扣减所有选购商品的库存（下单后调用）
async function deductAllStock() {
    let productsToDeduct = [];
    
    cookedProducts.forEach((p, i) => {
        if (p.isFixed) {
            let qty = parseInt(document.getElementById(`cooked_${i}`).value) || 0;
            if (qty > 0) {
                productsToDeduct.push({
                    name: p.name,
                    variant: p.unit,
                    qty: qty,
                    isMeat: isMeatProduct(p.name)
                });
            }
        } else {
            let qty500 = parseInt(document.getElementById(`cooked_${i}_500`).value) || 0;
            let qty1kg = parseInt(document.getElementById(`cooked_${i}_1kg`).value) || 0;
            if (qty500 > 0) {
                productsToDeduct.push({
                    name: p.name,
                    variant: "500G",
                    qty: qty500,
                    isMeat: true
                });
            }
            if (qty1kg > 0) {
                productsToDeduct.push({
                    name: p.name,
                    variant: "1KG",
                    qty: qty1kg,
                    isMeat: true
                });
            }
        }
    });
    
    let allSuccess = true;
    for (let item of productsToDeduct) {
        const success = await deductStock(item.name, item.qty, item.variant);
        if (!success) {
            allSuccess = false;
            console.error(`扣减库存失败: ${item.name} ${item.variant}`);
        }
    }
    
    return allSuccess;
}

// ========== UI渲染和计算函数 ==========

function changeQty(elementId, delta) {
  let input = document.getElementById(elementId);
  if (input) {
    let newVal = parseInt(input.value) || 0;
    newVal += delta;
    if (newVal < 0) newVal = 0;
    input.value = newVal;
    calc();
  }
}

// 渲染熟肉商品（添加点击查询库存功能）
function renderCookedProducts() {
  let html = "";
  cookedProducts.forEach((p, i) => {
    if (p.isFixed) {
      html += `<div class="product">
          <div class="product-name" onclick="showStockDialog('${p.name.replace(/'/g, "\\'")}', '${p.unit.replace(/'/g, "\\'")}')">
            ${p.name} <span class="stock-badge">📊 点我查库存</span>
          </div>
          <span class="product-price">RM${p.price} / ${p.unit}</span>
          <span class="product-qty">
            <input type="number" id="cooked_${i}" value="0" min="0" onchange="calc()" step="1" style="width:80px;">
          </span>
      </div>`;
    } else {
      html += `<div class="product" style="flex-direction:column; align-items:flex-start;">
          <div style="width:100%; margin-bottom:8px;">
            <span class="product-name" style="cursor:pointer;" onclick="showStockDialog('${p.name.replace(/'/g, "\\'")}', '500G/1KG')">
              ${p.name} <span class="stock-badge">📊 点我查库存</span>
            </span>
            <span class="product-price" style="float:right;">500G: RM${p.price500} | 1KG: RM${p.price1kg}</span>
          </div>
          <div style="display:flex; gap:20px; width:100%;">
            <div class="qty-group">
              <span style="font-weight:bold; min-width:45px;">500G</span>
              <button type="button" onclick="changeQty('cooked_${i}_500', -1)">-</button>
              <input type="number" id="cooked_${i}_500" value="0" min="0" onchange="calc()">
              <button type="button" onclick="changeQty('cooked_${i}_500', 1)">+</button>
            </div>
            <div class="qty-group">
              <span style="font-weight:bold; min-width:45px;">1KG</span>
              <button type="button" onclick="changeQty('cooked_${i}_1kg', -1)">-</button>
              <input type="number" id="cooked_${i}_1kg" value="0" min="0" onchange="calc()">
              <button type="button" onclick="changeQty('cooked_${i}_1kg', 1)">+</button>
            </div>
          </div>
      </div>`;
    }
  });
  document.getElementById("cookedProducts").innerHTML = html;
}

// 计算总价和运费
function calc() {
  let total = 0;
  let weight = 0;
  
  cookedProducts.forEach((p, i) => {
    if (p.isFixed) {
      let qty = parseInt(document.getElementById(`cooked_${i}`).value) || 0;
      total += qty * p.price;
      if (p.name.includes("肉松") || p.name.includes("Floss")) weight += qty * 0.2;
      else if (p.name.includes("虾米卷") || p.name.includes("Spring Roll")) weight += qty * 0.22;
      else if (p.name.includes("鸡蛋饼") || p.name.includes("Kuih Kapit")) weight += qty * 0.34;
      else if (p.name.includes("鱼皮") || p.name.includes("Fish Skin")) weight += qty * 0.1;
    } else {
      let qty500 = parseInt(document.getElementById(`cooked_${i}_500`).value) || 0;
      let qty1kg = parseInt(document.getElementById(`cooked_${i}_1kg`).value) || 0;
      total += qty500 * p.price500;
      total += qty1kg * p.price1kg;
      weight += qty500 * 0.5;
      weight += qty1kg * 1;
    }
  });
  
  let ship = 0;
  let delivery = document.getElementById("delivery").value;
  if (delivery === "邮寄") {
    if (weight <= 1) ship = 10;
    else if (weight <= 3) ship = 15;
    else if (weight <= 5) ship = 20;
    else ship = 20 + Math.ceil((weight - 5) / 1) * 5;
  }
  
  document.getElementById("productTotal").innerText = total.toFixed(2);
  document.getElementById("shipping").innerText = ship.toFixed(2);
  document.getElementById("total").innerText = (total + ship).toFixed(2);
}

// 提交订单（集成库存检查）
async function submitOrder() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  
  if (!name || !phone || !address) {
    alert("请填写完整资料");
    return;
  }
  
  let file = document.getElementById("payment").files[0];
  if (!file) {
    alert("必须上传付款截图");
    return;
  }
  if (file.size > 2 * 1024 * 1024) {
    alert("图片不能超过2MB");
    return;
  }
  
  // 下单前检查库存
  const stockOk = await checkAllStock();
  if (!stockOk) {
    return;
  }
  
  let btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "提交中...";
  
  let orderProducts = [];
  
  cookedProducts.forEach((p, i) => {
    if (p.isFixed) {
      let qty = parseInt(document.getElementById(`cooked_${i}`).value) || 0;
      if (qty > 0) orderProducts.push({ name: `${p.name} (${p.unit})`, qty: qty, price: p.price });
    } else {
      let qty500 = parseInt(document.getElementById(`cooked_${i}_500`).value) || 0;
      let qty1kg = parseInt(document.getElementById(`cooked_${i}_1kg`).value) || 0;
      if (qty500 > 0) orderProducts.push({ name: `${p.name} 500G`, qty: qty500, price: p.price500 });
      if (qty1kg > 0) orderProducts.push({ name: `${p.name} 1KG`, qty: qty1kg, price: p.price1kg });
    }
  });
  
  let reader = new FileReader();
  reader.onload = async function() {
    try {
      // 下单后扣减库存
      const deductSuccess = await deductAllStock();
      if (!deductSuccess) {
        alert("⚠️ 订单提交成功，但库存更新失败，请联系客服确认订单。");
      }
      
      let res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          name: name,
          phone: phone,
          address: address,
          delivery: document.getElementById("delivery").value,
          remark: document.getElementById("remark").value,
          products: orderProducts,
          productTotal: document.getElementById("productTotal").innerText,
          shippingFee: document.getElementById("shipping").innerText,
          total: document.getElementById("total").innerText,
          paymentImage: reader.result,
          freeGifts: ""
        })
      });
      
      let data = await res.json();
      
      if (data.status === "success") {
        document.body.innerHTML = `<div style="text-align:center;padding:50px;">
          <h2>🎉 下单成功</h2>
          <p>订单编号：<b>${data.orderId}</b></p >
          <p>我们会尽快处理您的订单</p >
          <p>请保留付款截图以备查询</p >
        </div>`;
      } else {
        alert("提交失败：" + (data.message || "未知错误"));
        btn.disabled = false;
        btn.innerText = "提交订单";
      }
    } catch (err) {
      alert("网络错误：" + err.message);
      btn.disabled = false;
      btn.innerText = "提交订单";
    }
  };
  
  reader.onerror = function() {
    alert("读取图片失败");
    btn.disabled = false;
    btn.innerText = "提交订单";
  };
  
  reader.readAsDataURL(file);
}

// 绑定事件和初始化
document.getElementById("submitBtn").onclick = submitOrder;
renderCookedProducts();
calc();
</script>
</body>
</html>
