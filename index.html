<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福满家 订单系统</title>
<style>
body { font-family: Arial; max-width:600px; margin:auto; padding:20px;}
h2 { text-align:center;}
input, select { width:100%; padding:10px; margin:5px 0; box-sizing:border-box;}
.product { border-bottom:1px solid #ddd; padding:10px 0;}
button { width:100%; padding:12px; background:black; color:white; border:none; font-size:16px; cursor:pointer;}
button:disabled { background:gray; cursor:not-allowed;}
.total { font-size:18px; margin-top:10px;}
</style>
</head>
<body>

<h2>福满家 订单系统</h2>

<h3>客户资料</h3>
<input id="name" placeholder="姓名 *">
<input id="phone" placeholder="联络号码 *">
<input id="address" placeholder="地址 *">

<h3>配送方式</h3>
<select id="delivery" onchange="calc()">
  <option value="自取">自取</option>
  <option value="邮寄">邮寄</option>
</select>

<p><b>自取地址：</b>9, Jalan Perdagangan 1, Taman Universiti, 81300, Skudai, Johor.</p >

<h3>商品</h3>
<div id="products"></div>

<h3>备注</h3>
<input id="remark" placeholder="备注（可选）">

<h3>上传付款截图 *</h3>
<input type="file" id="payment" accept="image/*">

<div class="total">
商品：RM <span id="productTotal">0</span><br>
运费：RM <span id="shipping">0</span><br>
<b>总计：RM <span id="total">0</span></b>
</div>

<button id="submitBtn">提交订单</button>

<script>
// 请替换成你最新部署的 Apps Script URL
const API_URL = "https://script.google.com/macros/s/AKfycbxHJUt4E7FpaGMGhvBICY91GQa53AqVkF_cNDSj-PR5fNYIEWre2pWQhVdN1t2LnCEt4A/exec";

// 商品数据
const products = [
  {name:"猪肉碎肉干 500G", price:55, weight:0.5},
  {name:"猪肉碎肉干 1KG", price:108, weight:1},
  {name:"鸡肉碎肉干 500G", price:55, weight:0.5},
  {name:"鸡肉碎肉干 1KG", price:108, weight:1},
  {name:"切片肉干 500G", price:70, weight:0.5},
  {name:"切片肉干 1KG", price:138, weight:1},
  {name:"帝王肉干 500G", price:95, weight:0.5},
  {name:"帝王肉干 1KG", price:188, weight:1},
  {name:"精品肉松 200G", price:30, weight:0.2},
  {name:"虾米卷 220G", price:22, weight:0.22},
  {name:"鸡蛋饼 340G", price:30, weight:0.34},
  {name:"鱼皮 100G", price:23, weight:0.1}
];

// 渲染商品
function renderProducts() {
  let html = "";
  products.forEach((p, i) => {
    html += `<div class="product">
      ${p.name} RM${p.price}
      <input type="number" id="q${i}" value="0" min="0" onchange="calc()">
    </div>`;
  });
  document.getElementById("products").innerHTML = html;
}

// 计算价格
function calc() {
  let total = 0;
  let weight = 0;
  
  products.forEach((p, i) => {
    let q = parseInt(document.getElementById("q"+i).value) || 0;
    total += q * p.price;
    weight += q * p.weight;
  });
  
  let ship = 0;
  let delivery = document.getElementById("delivery").value;
  if (delivery === "邮寄") {
    if (weight <= 1) ship = 10;
    else ship = 10 + Math.ceil((weight - 1) / 0.5) * 3;
  }
  
  document.getElementById("productTotal").innerText = total;
  document.getElementById("shipping").innerText = ship;
  document.getElementById("total").innerText = total + ship;
}

// 提交订单
async function submitOrder() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  
  if (!name || !phone || !address) {
    alert("请填写完整资料");
    return;
  }
  
  let file = document.getElementById("payment").files[0];
  if (!file) {
    alert("必须上传付款截图");
    return;
  }
  if (file.size > 2 * 1024 * 1024) {
    alert("图片不能超过2MB");
    return;
  }
  
  let btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "提交中...";
  
  let reader = new FileReader();
  reader.onload = async function() {
    let orderProducts = products.map((p, i) => ({
      name: p.name,
      qty: parseInt(document.getElementById("q"+i).value) || 0
    }));
    
    try {
      let res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          name: name,
          phone: phone,
          address: address,
          delivery: document.getElementById("delivery").value,
          remark: document.getElementById("remark").value,
          products: orderProducts,
          productTotal: document.getElementById("productTotal").innerText,
          shippingFee: document.getElementById("shipping").innerText,
          total: document.getElementById("total").innerText,
          paymentImage: reader.result
        })
      });
      
      let data = await res.json();
      
      if (data.status === "success") {
        document.body.innerHTML = `<div style="text-align:center;padding:50px;">
          <h2>🎉 下单成功</h2>
          <p>订单编号：<b>${data.orderNumber}</b></p >
          <p>我们会尽快处理您的订单</p >
          <p>请保留付款截图以备查询</p >
        </div>`;
      } else {
        alert("提交失败：" + (data.message || "未知错误"));
        btn.disabled = false;
        btn.innerText = "提交订单";
      }
    } catch (err) {
      alert("网络错误：" + err.message);
      btn.disabled = false;
      btn.innerText = "提交订单";
    }
  };
  
  reader.onerror = function() {
    alert("读取图片失败");
    btn.disabled = false;
    btn.innerText = "提交订单";
  };
  
  reader.readAsDataURL(file);
}

// 绑定按钮事件
document.getElementById("submitBtn").onclick = submitOrder;

// 初始化
renderProducts();
calc();
</script>
</body>
</html>
