<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>福满家订单系统 - 带库存管理</title>
<style>
  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  }
  body {
    background: #fef7e8;
    margin: 0;
    padding: 20px;
  }
  .container {
    max-width: 700px;
    margin: 0 auto;
    background: white;
    border-radius: 28px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    overflow: hidden;
    padding: 20px 24px 32px;
    border: 1px solid #ffddb0;
  }
  h2 {
    text-align: center;
    color: #b33c1c;
    font-weight: 700;
    margin-top: 0;
    margin-bottom: 8px;
    font-size: 1.8rem;
  }
  .sub {
    text-align: center;
    font-size: 13px;
    color: #a16241;
    border-bottom: 1px solid #f3dec8;
    padding-bottom: 12px;
    margin-bottom: 20px;
  }
  h3 {
    background: #fff0e4;
    padding: 10px 12px;
    border-radius: 24px;
    font-size: 1.2rem;
    color: #8b3c1c;
    margin: 20px 0 12px 0;
    font-weight: 600;
  }
  label {
    font-weight: 600;
    color: #5a3e2e;
    display: block;
    margin-top: 12px;
    margin-bottom: 4px;
    font-size: 0.9rem;
  }
  input, select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ffd9b5;
    border-radius: 20px;
    background: #fffef9;
    font-size: 14px;
    transition: 0.2s;
    margin-bottom: 4px;
  }
  input:focus, select:focus {
    outline: none;
    border-color: #c26e3c;
    box-shadow: 0 0 0 2px rgba(194,110,60,0.2);
  }
  .product-card {
    background: #ffffff;
    border-radius: 24px;
    padding: 12px 14px;
    border: 1px solid #ffe3cc;
    margin-bottom: 16px;
  }
  .product-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
    cursor: pointer;
  }
  .product-name {
    font-weight: 700;
    color: #5a3e2e;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .product-name:hover {
    color: #b33c1c;
  }
  .stock-badge {
    font-size: 11px;
    background: #f0f0f0;
    padding: 3px 8px;
    border-radius: 20px;
    color: #666;
    font-weight: normal;
  }
  .product-price {
    color: #b33c1c;
    font-weight: 600;
    font-size: 13px;
    background: #fff0e4;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .qty-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f9f5ef;
    padding: 6px 12px;
    border-radius: 40px;
    margin-top: 8px;
  }
  .qty-group button {
    width: 32px;
    background: #e9ddd0;
    color: #5a3e2e;
    margin: 0;
    padding: 5px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 30px;
    border: none;
    cursor: pointer;
  }
  .qty-group button:active {
    background: #d4c4b2;
  }
  .qty-group input {
    width: 70px;
    text-align: center;
    margin: 0;
    padding: 6px;
    border-radius: 30px;
  }
  .total {
    background: #fff3e6;
    padding: 16px;
    border-radius: 28px;
    margin: 20px 0;
  }
  .total-item {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    font-size: 1rem;
  }
  .total-item b {
    font-size: 1.3rem;
    color: #b33c1c;
  }
  button.submit-btn {
    width: 100%;
    padding: 14px;
    background: #b33c1c;
    color: white;
    border: none;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 40px;
    margin-top: 10px;
    transition: 0.2s;
  }
  button.submit-btn:disabled {
    background: #cfa690;
    cursor: not-allowed;
  }
  .required-star {
    color: #d9534f;
  }
  .address-note {
    font-size: 12px;
    color: #a16241;
    margin-top: -4px;
    margin-bottom: 8px;
  }
  .loading-spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid #fff;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div class="container">
  <h2>🍖 福满家</h2>
  <div class="sub">手工肉干 · 传统风味 · 新鲜制作</div>

  <h3>📋 客户资料</h3>
  <label>姓名 <span class="required-star">*</span></label>
  <input id="name" placeholder="请填写真实姓名">
  <label>联络号码 <span class="required-star">*</span></label>
  <input id="phone" placeholder="例如：0123456789" maxlength="11">
  <label>地址 <span class="required-star">*</span></label>
  <input id="address" placeholder="完整送货地址">
  <div class="address-note">📌 邮寄需填写完整地址，自取则填"自取"</div>

  <h3>🚚 配送方式</h3>
  <select id="delivery">
    <option value="自取">自取 (免运费)</option>
    <option value="邮寄">邮寄 (按重量计算)</option>
  </select>
  <p style="font-size:13px; background:#f9ede3; padding:8px; border-radius:16px;"><b>🏠 自取地址：</b>9, Jalan Perdagangan 1, Taman Universiti, 81300 Skudai, Johor.</p>

  <h3>🍖 商品列表 <span style="font-size:12px; font-weight:normal;">(点击商品名查看实时库存)</span></h3>
  <div id="cookedProducts"></div>

  <h3>📝 备注</h3>
  <input id="remark" placeholder="特殊要求或备注 (选填)">

  <h3>🖼️ 上传付款截图 <span class="required-star">*</span></h3>
  <input type="file" id="payment" accept="image/*">
  <div class="address-note">支持 JPG/PNG，不超过2MB</div>

  <div class="total">
    <div class="total-item">商品总计：RM <span id="productTotal">0.00</span></div>
    <div class="total-item">运费：RM <span id="shipping">0.00</span></div>
    <div class="total-item"><b>总计付款：RM <span id="total">0.00</span></b></div>
  </div>

  <button class="submit-btn" id="submitBtn">📦 提交订单</button>
</div>

<script>
// ======================== 配置 ========================
// ⚠️ 请替换成您部署后的 Apps Script URL
const API_URL = "https://script.google.com/macros/s/AKfycby3YWu210NqfKkRxM3DVfp3OZZQYxD0IUno8FdBfF-Zy95f69A00ZjAIXH8bGKgb1MAUQ/exec";

// ======================== 商品数据 ========================
const cookedProducts = [
  { name: "猪肉碎肉干 Pork Meat (Minced Meat)", price500: 55, price1kg: 108, productId500: "猪肉碎肉干 Pork Meat (Minced Meat)_500g", productId1kg: "猪肉碎肉干 Pork Meat (Minced Meat)_1kg" },
  { name: "鸡肉碎肉干 Chicken Meat (Minced Meat)", price500: 55, price1kg: 108, productId500: "鸡肉碎肉干 Chicken Meat (Minced Meat)_500g", productId1kg: "鸡肉碎肉干 Chicken Meat (Minced Meat)_1kg" },
  { name: "切片肉干 BBQ Sliced Pork Meat", price500: 70, price1kg: 138, productId500: "切片肉干 BBQ Sliced Pork Meat_500g", productId1kg: "切片肉干 BBQ Sliced Pork Meat_1kg" },
  { name: "帝王肉干 Signature BBQ Bacon", price500: 95, price1kg: 188, productId500: "帝王肉干 Signature BBQ Bacon_500g", productId1kg: "帝王肉干 Signature BBQ Bacon_1kg" },
  { name: "精品肉松 Pork Floss", price: 30, unit: "200G/Tin", isFixed: true, productId: "精品肉松 Pork Floss" },
  { name: "黄金辣味虾米卷 Spicy Spring Roll", price: 22, unit: "220G/Tin", isFixed: true, productId: "黄金辣味虾米卷 Spicy Spring Roll" },
  { name: "炭烧鸡蛋饼 Traditional Kuih Kapit", price: 30, unit: "340G/Tin", isFixed: true, productId: "炭烧鸡蛋饼 Traditional Kuih Kapit" },
  { name: "咸蛋鱼皮 Salted Egg Fish Skin", price: 23, unit: "100G/Pkt", isFixed: true, productId: "咸蛋鱼皮 Salted Egg Fish Skin" },
  { name: "麻辣鱼皮 Mala Fish Skin", price: 23, unit: "100G/Pkt", isFixed: true, productId: "麻辣鱼皮 Mala Fish Skin" }
];

function isMeatProduct(product) {
  return product.includes("肉干") || product.includes("Meat") || product.includes("Bacon");
}

// ---------- 库存 API（适配您的后端格式）----------
async function fetchStock(productId) {
  try {
    const url = `${API_URL}?action=getStock&productId=${encodeURIComponent(productId)}`;
    const response = await fetch(url);
    const data = await response.json();
    return data;
  } catch (error) {
    console.error("库存查询失败:", error);
    return { success: false, error: error.toString() };
  }
}

async function deductStockApi(productId, quantity) {
  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "deductStock",
        productId: productId,
        quantity: quantity
      })
    });
    const data = await response.json();
    return data;
  } catch (error) {
    console.error("扣减库存失败:", error);
    return { success: false, error: error.toString() };
  }
}

// 显示库存弹窗
async function showStockDialog(productName, productId, variant = "") {
  let displayName = variant ? `${productName} (${variant})` : productName;
  
  if (!productId) {
    alert(`⚠️ ${displayName}\n无法查询库存，请联系客服。`);
    return;
  }
  
  alert(`🔍 正在查询 ${displayName} 库存...`);
  const result = await fetchStock(productId);
  
  if (result.success) {
    alert(`✅ ${displayName}\n📦 剩余库存：${result.stock} 个\n可以正常下单！`);
  } else {
    alert(`❌ ${displayName}\n${result.error || "库存查询失败，请稍后再试"}`);
  }
}

// 下单前检查所有商品库存
async function checkAllStock() {
  let itemsToCheck = [];
  
  cookedProducts.forEach((p, i) => {
    if (p.isFixed) {
      let qty = parseInt(document.getElementById(`cooked_${i}`)?.value) || 0;
      if (qty > 0 && p.productId) {
        itemsToCheck.push({ productId: p.productId, name: p.name, variant: p.unit, qty: qty });
      }
    } else {
      let qty500 = parseInt(document.getElementById(`cooked_${i}_500`)?.value) || 0;
      let qty1kg = parseInt(document.getElementById(`cooked_${i}_1kg`)?.value) || 0;
      if (qty500 > 0 && p.productId500) {
        itemsToCheck.push({ productId: p.productId500, name: p.name, variant: "500G", qty: qty500 });
      }
      if (qty1kg > 0 && p.productId1kg) {
        itemsToCheck.push({ productId: p.productId1kg, name: p.name, variant: "1KG", qty: qty1kg });
      }
    }
  });
  
  if (itemsToCheck.length === 0) {
    alert("请至少选择一件商品");
    return false;
  }
  
  for (let item of itemsToCheck) {
    const stockResult = await fetchStock(item.productId);
    if (!stockResult.success) {
      alert(`⚠️ 无法验证 ${item.name} ${item.variant} 的库存：${stockResult.error}`);
      return false;
    }
    if (stockResult.stock < item.qty) {
      alert(`❌ ${item.name} ${item.variant}\n需求数量：${item.qty}\n剩余库存：${stockResult.stock}\n\n库存不足，无法下单！`);
      return false;
    }
  }
  return true;
}

// 提交订单后扣减所有商品库存
async function deductAllStock() {
  let itemsToDeduct = [];
  
  cookedProducts.forEach((p, i) => {
    if (p.isFixed) {
      let qty = parseInt(document.getElementById(`cooked_${i}`)?.value) || 0;
      if (qty > 0 && p.productId) {
        itemsToDeduct.push({ productId: p.productId, quantity: qty });
      }
    } else {
      let qty500 = parseInt(document.getElementById(`cooked_${i}_500`)?.value) || 0;
      let qty1kg = parseInt(document.getElementById(`cooked_${i}_1kg`)?.value) || 0;
      if (qty500 > 0 && p.productId500) {
        itemsToDeduct.push({ productId: p.productId500, quantity: qty500 });
      }
      if (qty1kg > 0 && p.productId1kg) {
        itemsToDeduct.push({ productId: p.productId1kg, quantity: qty1kg });
      }
    }
  });
  
  let allSuccess = true;
  for (let item of itemsToDeduct) {
    const result = await deductStockApi(item.productId, item.quantity);
    if (!result.success) {
      console.error(`扣减失败: ${item.productId}`, result.error);
      allSuccess = false;
    }
  }
  return allSuccess;
}

// ---------- UI 渲染 & 计算 ----------
function changeQty(elementId, delta) {
  let input = document.getElementById(elementId);
  if (input) {
    let newVal = (parseInt(input.value) || 0) + delta;
    if (newVal < 0) newVal = 0;
    input.value = newVal;
    calc();
  }
}

function renderCookedProducts() {
  let html = "";
  cookedProducts.forEach((p, i) => {
    if (p.isFixed) {
      html += `<div class="product-card">
        <div class="product-header" onclick="showStockDialog('${p.name.replace(/'/g, "\\'")}', '${p.productId}', '${p.unit.replace(/'/g, "\\'")}')">
          <span class="product-name">📦 ${p.name} <span class="stock-badge">🔍 查库存</span></span>
          <span class="product-price">RM${p.price} / ${p.unit}</span>
        </div>
        <div class="qty-group">
          <button type="button" onclick="changeQty('cooked_${i}', -1)">−</button>
          <input type="number" id="cooked_${i}" value="0" min="0" step="1" onchange="calc()">
          <button type="button" onclick="changeQty('cooked_${i}', 1)">+</button>
        </div>
      </div>`;
    } else {
      html += `<div class="product-card">
        <div class="product-header" onclick="showStockDialog('${p.name.replace(/'/g, "\\'")}', '${p.productId500}', '500G/1KG')">
          <span class="product-name">🥩 ${p.name} <span class="stock-badge">📊 查库存</span></span>
          <span class="product-price">500G RM${p.price500} | 1KG RM${p.price1kg}</span>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:12px; margin-top:6px;">
          <div class="qty-group">
            <span style="font-weight:600;">500G</span>
            <button type="button" onclick="changeQty('cooked_${i}_500', -1)">−</button>
            <input type="number" id="cooked_${i}_500" value="0" min="0" onchange="calc()">
            <button type="button" onclick="changeQty('cooked_${i}_500', 1)">+</button>
          </div>
          <div class="qty-group">
            <span style="font-weight:600;">1KG</span>
            <button type="button" onclick="changeQty('cooked_${i}_1kg', -1)">−</button>
            <input type="number" id="cooked_${i}_1kg" value="0" min="0" onchange="calc()">
            <button type="button" onclick="changeQty('cooked_${i}_1kg', 1)">+</button>
          </div>
        </div>
      </div>`;
    }
  });
  document.getElementById("cookedProducts").innerHTML = html;
}

function calc() {
  let total = 0;
  let weight = 0;
  cookedProducts.forEach((p, i) => {
    if (p.isFixed) {
      let qty = parseInt(document.getElementById(`cooked_${i}`)?.value) || 0;
      total += qty * p.price;
      if (p.name.includes("肉松")) weight += qty * 0.2;
      else if (p.name.includes("虾米卷")) weight += qty * 0.22;
      else if (p.name.includes("鸡蛋饼")) weight += qty * 0.34;
      else if (p.name.includes("鱼皮")) weight += qty * 0.1;
    } else {
      let qty500 = parseInt(document.getElementById(`cooked_${i}_500`)?.value) || 0;
      let qty1kg = parseInt(document.getElementById(`cooked_${i}_1kg`)?.value) || 0;
      total += qty500 * p.price500 + qty1kg * p.price1kg;
      weight += qty500 * 0.5 + qty1kg * 1;
    }
  });
  let ship = 0;
  let delivery = document.getElementById("delivery").value;
  if (delivery === "邮寄") {
    if (weight <= 1) ship = 10;
    else if (weight <= 3) ship = 15;
    else if (weight <= 5) ship = 20;
    else ship = 20 + Math.ceil((weight - 5) / 1) * 5;
  }
  document.getElementById("productTotal").innerText = total.toFixed(2);
  document.getElementById("shipping").innerText = ship.toFixed(2);
  document.getElementById("total").innerText = (total + ship).toFixed(2);
}

// 提交订单
let submittingFlag = false;

async function submitOrder() {
  if (submittingFlag) return;
  
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();
  
  if (!name || !phone || !address) {
    alert("请完整填写姓名、电话、地址");
    return;
  }
  const phoneRegex = /^[0-9]{9,11}$/;
  if (!phoneRegex.test(phone)) {
    alert("请填写正确的手机号码 (9-11位数字)");
    return;
  }
  
  const file = document.getElementById("payment").files[0];
  if (!file) {
    alert("请上传付款截图");
    return;
  }
  if (file.size > 2 * 1024 * 1024) {
    alert("图片不能超过2MB");
    return;
  }
  
  // 检查库存
  const stockOk = await checkAllStock();
  if (!stockOk) return;
  
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> 提交订单中...';
  submittingFlag = true;
  
  // 整理商品清单
  let orderProducts = [];
  cookedProducts.forEach((p, i) => {
    if (p.isFixed) {
      let qty = parseInt(document.getElementById(`cooked_${i}`)?.value) || 0;
      if (qty > 0) orderProducts.push({ name: `${p.name} (${p.unit})`, qty: qty, price: p.price });
    } else {
      let qty500 = parseInt(document.getElementById(`cooked_${i}_500`)?.value) || 0;
      let qty1kg = parseInt(document.getElementById(`cooked_${i}_1kg`)?.value) || 0;
      if (qty500 > 0) orderProducts.push({ name: `${p.name} 500G`, qty: qty500, price: p.price500 });
      if (qty1kg > 0) orderProducts.push({ name: `${p.name} 1KG`, qty: qty1kg, price: p.price1kg });
    }
  });
  
  const reader = new FileReader();
  reader.onload = async function(evt) {
    try {
      // 扣减库存
      const deductResult = await deductAllStock();
      if (!deductResult) {
        console.warn("部分商品库存扣减失败");
      }
      
      // 提交订单
      const payload = {
        name: name,
        phone: phone,
        address: address,
        delivery: document.getElementById("delivery").value,
        remark: document.getElementById("remark").value,
        products: orderProducts,
        productTotal: document.getElementById("productTotal").innerText,
        shippingFee: document.getElementById("shipping").innerText,
        total: document.getElementById("total").innerText,
        paymentImage: evt.target.result,
        freeGifts: ""
      };
      
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      
      if (data.status === "success") {
        document.body.innerHTML = `<div style="max-width:600px; margin:50px auto; text-align:center; background:white; border-radius:28px; padding:32px;">
          <h2 style="color:#b33c1c;">🎉 下单成功！</h2>
          <p>订单编号：<strong style="font-size:20px;">${data.orderId}</strong></p>
          <p>我们会尽快处理您的订单</p>
          <p style="font-size:13px; color:#a16241;">请保留订单号以备查询</p>
        </div>`;
      } else {
        alert("提交失败：" + (data.message || "未知错误"));
        btn.disabled = false;
        btn.innerHTML = "📦 提交订单";
        submittingFlag = false;
      }
    } catch (err) {
      alert("网络错误：" + err.message);
      btn.disabled = false;
      btn.innerHTML = "📦 提交订单";
      submittingFlag = false;
    }
  };
  
  reader.onerror = function() {
    alert("读取图片失败");
    btn.disabled = false;
    btn.innerHTML = "📦 提交订单";
    submittingFlag = false;
  };
  
  reader.readAsDataURL(file);
}

// 初始化
document.getElementById("delivery").addEventListener("change", calc);
document.getElementById("submitBtn").onclick = submitOrder;
renderCookedProducts();
calc();
</script>
</body>
</html>
