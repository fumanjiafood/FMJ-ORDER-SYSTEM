<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福满家订单系统</title>
<style>
  * { box-sizing: border-box; font-family: system-ui, sans-serif; }
  body { background: #fef7e8; margin: 0; padding: 20px; }
  .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 28px; padding: 20px 24px 32px; border: 1px solid #ffddb0; }
  h2 { text-align: center; color: #b33c1c; margin: 0 0 8px; }
  .sub { text-align: center; color: #a16241; font-size: 13px; border-bottom: 1px solid #f3dec8; padding-bottom: 12px; margin-bottom: 20px; }
  h3 { background: #fff0e4; padding: 10px 12px; border-radius: 24px; color: #8b3c1c; margin: 20px 0 12px; }
  label { font-weight: 600; color: #5a3e2e; display: block; margin: 12px 0 4px; }
  input, select { width: 100%; padding: 12px 14px; border: 1px solid #ffd9b5; border-radius: 20px; background: #fffef9; }
  .product-card { background: #fff; border-radius: 24px; padding: 12px 14px; border: 1px solid #ffe3cc; margin-bottom: 16px; }
  .product-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .product-name { font-weight: 700; color: #5a3e2e; }
  .stock-display { font-size: 11px; padding: 3px 8px; border-radius: 20px; display: inline-block; margin-right: 10px; }
  .stock-display.high { background: #e8f5e9; color: #2e7d32; }
  .stock-display.low { background: #fff3e0; color: #ef6c00; }
  .stock-display.out { background: #ffcdd2; color: #b71c1c; }
  .qty-group { display: flex; align-items: center; gap: 8px; background: #f9f5ef; padding: 6px 12px; border-radius: 40px; margin-top: 8px; }
  .qty-group button { width: 32px; background: #e9ddd0; border: none; border-radius: 30px; font-size: 18px; cursor: pointer; }
  .qty-group button:disabled { opacity: 0.5; cursor: not-allowed; }
  .qty-group input { width: 70px; text-align: center; padding: 6px; border-radius: 30px; border: 1px solid #ffd9b5; }
  .total { background: #fff3e6; padding: 16px; border-radius: 28px; margin: 20px 0; }
  .total-item { display: flex; justify-content: space-between; margin: 10px 0; }
  button.submit-btn { width: 100%; padding: 14px; background: #b33c1c; color: white; border: none; font-size: 18px; font-weight: bold; border-radius: 40px; cursor: pointer; }
  .refresh-stock { float: right; font-size: 12px; background: #e9ddd0; padding: 4px 12px; border-radius: 20px; cursor: pointer; }
  .error-banner { background: #ffebee; color: #c62828; padding: 10px; border-radius: 20px; margin-bottom: 20px; text-align: center; display: none; }
  .required-star { color: #d9534f; }
  .address-note { font-size: 12px; color: #a16241; margin-top: -4px; margin-bottom: 8px; }
  .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h2>福满家</h2>
  <div class="sub">手工肉干 · 传统风味 · 新鲜制作</div>
  <div id="apiError" class="error-banner">⚠️ 无法连接到服务器</div>

  <h3>📋 客户资料</h3>
  <label>姓名 <span class="required-star">*</span></label>
  <input id="name" placeholder="请填写真实姓名">
  <label>联络号码 <span class="required-star">*</span></label>
  <input id="phone" placeholder="0123456789" maxlength="11">
  <label>地址 <span class="required-star">*</span></label>
  <input id="address" placeholder="完整送货地址">
  <div class="address-note">📌 邮寄需填写完整地址，自取则填"自取"</div>

  <h3>🚚 配送方式</h3>
  <select id="delivery">
    <option value="自取">自取 (免运费)</option>
    <option value="邮寄">邮寄 (按重量计算)</option>
  </select>

  <h3>🍖 商品列表 <span class="refresh-stock" onclick="loadAllStocks()">🔄 刷新库存</span></h3>
  <div id="productList">加载中...</div>

  <h3>📝 备注</h3>
  <input id="remark" placeholder="特殊要求或备注">

  <h3>🖼️ 上传付款截图 <span class="required-star">*</span></h3>
  <input type="file" id="payment" accept="image/*">

  <div class="total">
    <div class="total-item">商品总计：RM <span id="productTotal">0.00</span></div>
    <div class="total-item">运费：RM <span id="shipping">0.00</span></div>
    <div class="total-item"><b>总计：RM <span id="total">0.00</span></b></div>
  </div>

  <button class="submit-btn" id="submitBtn">📦 提交订单</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxTQeNlxs-piQbYdtC4t3XIVCWHOs8cV434f2uwGiKGCiuHqU0NdnBY3IQonCU7E29TDg/exec";

// 商品列表：使用数字ID
const products = [
  { id: 1, name: "猪肉碎肉干 Pork Meat (Minced Meat)", spec: "500G", price: 55 },
  { id: 2, name: "猪肉碎肉干 Pork Meat (Minced Meat)", spec: "1KG", price: 108 },
  { id: 3, name: "鸡肉碎肉干 Chicken Meat (Minced Meat)", spec: "500G", price: 55 },
  { id: 4, name: "鸡肉碎肉干 Chicken Meat (Minced Meat)", spec: "1KG", price: 108 },
  { id: 5, name: "切片肉干 BBQ Sliced Pork Meat", spec: "500G", price: 70 },
  { id: 6, name: "切片肉干 BBQ Sliced Pork Meat", spec: "1KG", price: 138 },
  { id: 7, name: "帝王肉干 Signature BBQ Bacon", spec: "500G", price: 95 },
  { id: 8, name: "帝王肉干 Signature BBQ Bacon", spec: "1KG", price: 188 },
  { id: 9, name: "精品肉松 Pork Floss", spec: "200G/Tin", price: 30, isFixed: true },
  { id: 10, name: "黄金辣味虾米卷 Spicy Spring Roll", spec: "220G/Tin", price: 22, isFixed: true },
  { id: 11, name: "炭烧鸡蛋饼 Traditional Kuih Kapit", spec: "340G/Tin", price: 30, isFixed: true },
  { id: 12, name: "咸蛋鱼皮 Salted Egg Fish Skin", spec: "100G/Pkt", price: 23, isFixed: true },
  { id: 13, name: "麻辣鱼皮 Mala Fish Skin", spec: "100G/Pkt", price: 23, isFixed: true }
];

let stocks = {};

async function getStock(id) {
  try {
    let resp = await fetch(`${API_URL}?id=${id}`);
    let data = await resp.json();
    if (data.success) return data.stock;
    return 0;
  } catch(e) {
    document.getElementById("apiError").style.display = "block";
    return 0;
  }
}

async function loadAllStocks() {
  for (let p of products) {
    stocks[p.id] = await getStock(p.id);
  }
  renderProducts();
  calcTotal();
}

function renderProducts() {
  let html = "";
  // 按类别分组显示
  let meat500 = products.filter(p => p.id <= 8 && p.spec === "500G");
  let meat1kg = products.filter(p => p.id <= 8 && p.spec === "1KG");
  let fixed = products.filter(p => p.isFixed);
  
  for (let i = 0; i < meat500.length; i++) {
    let p500 = meat500[i];
    let p1kg = meat1kg[i];
    let stock500 = stocks[p500.id] || 0;
    let stock1kg = stocks[p1kg.id] || 0;
    
    html += `<div class="product-card">
      <div class="product-header">
        <span class="product-name">🥩 ${p500.name}</span>
        <span class="product-price">500G RM${p500.price} | 1KG RM${p1kg.price}</span>
      </div>
      <div>
        <span class="stock-display ${stock500 <= 0 ? 'out' : stock500 <= 10 ? 'low' : 'high'}">📊 500G: ${stock500 <= 0 ? '缺货' : '库存 ' + stock500}</span>
        <span class="stock-display ${stock1kg <= 0 ? 'out' : stock1kg <= 10 ? 'low' : 'high'}">📊 1KG: ${stock1kg <= 0 ? '缺货' : '库存 ' + stock1kg}</span>
      </div>
      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <div class="qty-group">
          <span>500G</span>
          <button onclick="changeQty('qty_${p500.id}', -1, ${stock500})" ${stock500 <= 0 ? 'disabled' : ''}>−</button>
          <input type="number" id="qty_${p500.id}" value="0" min="0" max="${stock500}" onchange="calcTotal()" ${stock500 <= 0 ? 'disabled' : ''}>
          <button onclick="changeQty('qty_${p500.id}', 1, ${stock500})" ${stock500 <= 0 ? 'disabled' : ''}>+</button>
        </div>
        <div class="qty-group">
          <span>1KG</span>
          <button onclick="changeQty('qty_${p1kg.id}', -1, ${stock1kg})" ${stock1kg <= 0 ? 'disabled' : ''}>−</button>
          <input type="number" id="qty_${p1kg.id}" value="0" min="0" max="${stock1kg}" onchange="calcTotal()" ${stock1kg <= 0 ? 'disabled' : ''}>
          <button onclick="changeQty('qty_${p1kg.id}', 1, ${stock1kg})" ${stock1kg <= 0 ? 'disabled' : ''}>+</button>
        </div>
      </div>
    </div>`;
  }
  
  for (let p of fixed) {
    let stock = stocks[p.id] || 0;
    html += `<div class="product-card">
      <div class="product-header">
        <span class="product-name">📦 ${p.name}</span>
        <span class="product-price">RM${p.price} / ${p.spec}</span>
      </div>
      <div><span class="stock-display ${stock <= 0 ? 'out' : stock <= 10 ? 'low' : 'high'}">📊 ${stock <= 0 ? '❌ 缺货' : '✅ 库存 ' + stock}</span></div>
      <div class="qty-group">
        <button onclick="changeQty('qty_${p.id}', -1, ${stock})" ${stock <= 0 ? 'disabled' : ''}>−</button>
        <input type="number" id="qty_${p.id}" value="0" min="0" max="${stock}" onchange="calcTotal()" ${stock <= 0 ? 'disabled' : ''}>
        <button onclick="changeQty('qty_${p.id}', 1, ${stock})" ${stock <= 0 ? 'disabled' : ''}>+</button>
      </div>
    </div>`;
  }
  
  document.getElementById("productList").innerHTML = html;
}

function changeQty(inputId, delta, maxStock) {
  let input = document.getElementById(inputId);
  if (!input || input.disabled) return;
  let newVal = (parseInt(input.value) || 0) + delta;
  if (newVal < 0) newVal = 0;
  if (newVal > maxStock) newVal = maxStock;
  input.value = newVal;
  calcTotal();
}

function calcTotal() {
  let total = 0;
  let weight = 0;
  for (let p of products) {
    let qty = parseInt(document.getElementById(`qty_${p.id}`)?.value) || 0;
    total += qty * p.price;
    if (p.spec === "500G") weight += qty * 0.5;
    else if (p.spec === "1KG") weight += qty * 1;
    else if (p.name.includes("肉松")) weight += qty * 0.2;
    else if (p.name.includes("虾米卷")) weight += qty * 0.22;
    else if (p.name.includes("鸡蛋饼")) weight += qty * 0.34;
    else if (p.name.includes("鱼皮")) weight += qty * 0.1;
  }
  let ship = 0;
  if (document.getElementById("delivery").value === "邮寄") {
    if (weight <= 1) ship = 10;
    else if (weight <= 3) ship = 15;
    else if (weight <= 5) ship = 20;
    else ship = 20 + Math.ceil((weight - 5) / 1) * 5;
  }
  document.getElementById("productTotal").innerText = total.toFixed(2);
  document.getElementById("shipping").innerText = ship.toFixed(2);
  document.getElementById("total").innerText = (total + ship).toFixed(2);
}

async function submitOrder() {
  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let address = document.getElementById("address").value.trim();
  if (!name || !phone || !address) { alert("请填写完整资料"); return; }
  if (!/^\d{9,11}$/.test(phone)) { alert("手机号格式错误"); return; }
  
  let file = document.getElementById("payment").files[0];
  if (!file) { alert("请上传付款截图"); return; }
  
  let orderProducts = [];
  for (let p of products) {
    let qty = parseInt(document.getElementById(`qty_${p.id}`)?.value) || 0;
    if (qty > 0) {
      orderProducts.push({ id: p.id, name: p.name + " " + p.spec, qty: qty, price: p.price });
    }
  }
  if (orderProducts.length === 0) { alert("请选择商品"); return; }
  
  let btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> 提交中...';
  
  let reader = new FileReader();
  reader.onload = async function(evt) {
    try {
      let payload = {
        name, phone, address,
        delivery: document.getElementById("delivery").value,
        remark: document.getElementById("remark").value,
        products: orderProducts,
        productTotal: document.getElementById("productTotal").innerText,
        shippingFee: document.getElementById("shipping").innerText,
        total: document.getElementById("total").innerText,
        paymentImage: evt.target.result
      };
      let resp = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
      let data = await resp.json();
      if (data.status === "success") {
        document.body.innerHTML = `<div style="max-width:600px; margin:50px auto; text-align:center; background:white; border-radius:28px; padding:32px;">
          <h2 style="color:#b33c1c;">🎉 下单成功！</h2>
          <p>订单号：<strong>${data.orderId}</strong></p>
          <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; background:#b33c1c; color:white; border:none; border-radius:20px;">继续下单</button>
        </div>`;
      } else {
        alert("失败：" + data.message);
        btn.disabled = false;
        btn.innerHTML = "📦 提交订单";
      }
    } catch(e) {
      alert("网络错误：" + e.message);
      btn.disabled = false;
      btn.innerHTML = "📦 提交订单";
    }
  };
  reader.readAsDataURL(file);
}

document.getElementById("delivery").addEventListener("change", calcTotal);
document.getElementById("submitBtn").onclick = submitOrder;
loadAllStocks();
</script>
</body>
</html>
