<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>福满家订单系统 - 实时库存</title>
<style>
  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  }
  body {
    background: #fef7e8;
    margin: 0;
    padding: 20px;
  }
  .container {
    max-width: 700px;
    margin: 0 auto;
    background: white;
    border-radius: 28px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    overflow: hidden;
    padding: 20px 24px 32px;
    border: 1px solid #ffddb0;
  }
  h2 {
    text-align: center;
    color: #b33c1c;
    font-weight: 700;
    margin-top: 0;
    margin-bottom: 8px;
    font-size: 1.8rem;
  }
  .sub {
    text-align: center;
    font-size: 13px;
    color: #a16241;
    border-bottom: 1px solid #f3dec8;
    padding-bottom: 12px;
    margin-bottom: 20px;
  }
  h3 {
    background: #fff0e4;
    padding: 10px 12px;
    border-radius: 24px;
    font-size: 1.2rem;
    color: #8b3c1c;
    margin: 20px 0 12px 0;
    font-weight: 600;
  }
  label {
    font-weight: 600;
    color: #5a3e2e;
    display: block;
    margin-top: 12px;
    margin-bottom: 4px;
    font-size: 0.9rem;
  }
  input, select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ffd9b5;
    border-radius: 20px;
    background: #fffef9;
    font-size: 14px;
    transition: 0.2s;
    margin-bottom: 4px;
  }
  input:focus, select:focus {
    outline: none;
    border-color: #c26e3c;
    box-shadow: 0 0 0 2px rgba(194,110,60,0.2);
  }
  .product-card {
    background: #ffffff;
    border-radius: 24px;
    padding: 12px 14px;
    border: 1px solid #ffe3cc;
    margin-bottom: 16px;
    transition: 0.2s;
  }
  .product-card.out-of-stock {
    background: #fff5f5;
    border-color: #ffcccc;
    opacity: 0.7;
  }
  .product-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .product-name {
    font-weight: 700;
    color: #5a3e2e;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .stock-display {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: normal;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .stock-display.high {
    background: #e8f5e9;
    color: #2e7d32;
  }
  .stock-display.medium {
    background: #fff3e0;
    color: #ef6c00;
  }
  .stock-display.low {
    background: #ffebee;
    color: #c62828;
  }
  .stock-display.out {
    background: #ffcdd2;
    color: #b71c1c;
  }
  .stock-display.loading {
    background: #f0f0f0;
    color: #999;
  }
  .product-price {
    color: #b33c1c;
    font-weight: 600;
    font-size: 13px;
    background: #fff0e4;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .qty-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f9f5ef;
    padding: 6px 12px;
    border-radius: 40px;
    margin-top: 8px;
  }
  .qty-group button {
    width: 32px;
    background: #e9ddd0;
    color: #5a3e2e;
    margin: 0;
    padding: 5px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 30px;
    border: none;
    cursor: pointer;
  }
  .qty-group button:active {
    background: #d4c4b2;
  }
  .qty-group button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .qty-group input {
    width: 70px;
    text-align: center;
    margin: 0;
    padding: 6px;
    border-radius: 30px;
  }
  .qty-group input:disabled {
    background: #f0f0f0;
    cursor: not-allowed;
  }
  .total {
    background: #fff3e6;
    padding: 16px;
    border-radius: 28px;
    margin: 20px 0;
  }
  .total-item {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    font-size: 1rem;
  }
  .total-item b {
    font-size: 1.3rem;
    color: #b33c1c;
  }
  button.submit-btn {
    width: 100%;
    padding: 14px;
    background: #b33c1c;
    color: white;
    border: none;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 40px;
    margin-top: 10px;
    transition: 0.2s;
  }
  button.submit-btn:disabled {
    background: #cfa690;
    cursor: not-allowed;
  }
  .required-star {
    color: #d9534f;
  }
  .address-note {
    font-size: 12px;
    color: #a16241;
    margin-top: -4px;
    margin-bottom: 8px;
  }
  .loading-spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid #fff;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .refresh-stock {
    float: right;
    font-size: 12px;
    background: #e9ddd0;
    padding: 4px 12px;
    border-radius: 20px;
    cursor: pointer;
  }
  .refresh-stock:hover {
    background: #d4c4b2;
  }
  .error-banner {
    background: #ffebee;
    color: #c62828;
    padding: 10px 15px;
    border-radius: 20px;
    margin-bottom: 20px;
    font-size: 14px;
    text-align: center;
  }
  .success-banner {
    background: #e8f5e9;
    color: #2e7d32;
    padding: 10px 15px;
    border-radius: 20px;
    margin-bottom: 20px;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <h2>🍖 福满家</h2>
  <div class="sub">手工肉干 · 传统风味 · 新鲜制作</div>

  <div id="apiError" class="error-banner" style="display:none;">
    ⚠️ 无法连接到服务器，请检查网络或联系管理员
  </div>

  <h3>📋 客户资料</h3>
  <label>姓名 <span class="required-star">*</span></label>
  <input id="name" placeholder="请填写真实姓名">
  <label>联络号码 <span class="required-star">*</span></label>
  <input id="phone" placeholder="例如：0123456789" maxlength="11">
  <label>地址 <span class="required-star">*</span></label>
  <input id="address" placeholder="完整送货地址">
  <div class="address-note">📌 邮寄需填写完整地址，自取则填"自取"</div>

  <h3>🚚 配送方式</h3>
  <select id="delivery">
    <option value="自取">自取 (免运费)</option>
    <option value="邮寄">邮寄 (按重量计算)</option>
  </select>
  <p style="font-size:13px; background:#f9ede3; padding:8px; border-radius:16px;"><b>🏠 自取地址：</b>9, Jalan Perdagangan 1, Taman Universiti, 81300 Skudai, Johor.</p>

  <h3>🍖 商品列表 <span class="refresh-stock" onclick="refreshAllStock()">🔄 刷新库存</span></h3>
  <div id="cookedProducts"></div>

  <h3>📝 备注</h3>
  <input id="remark" placeholder="特殊要求或备注 (选填)">

  <h3>🖼️ 上传付款截图 <span class="required-star">*</span></h3>
  <input type="file" id="payment" accept="image/*">
  <div class="address-note">支持 JPG/PNG，不超过2MB</div>

  <div class="total">
    <div class="total-item">商品总计：RM <span id="productTotal">0.00</span></div>
    <div class="total-item">运费：RM <span id="shipping">0.00</span></div>
    <div class="total-item"><b>总计付款：RM <span id="total">0.00</span></b></div>
  </div>

  <button class="submit-btn" id="submitBtn">📦 提交订单</button>
</div>

<script>
// ======================== 请替换为您的 Apps Script Web App URL ========================
const API_URL = "https://script.google.com/macros/s/AKfycbwoG2OyBtW504HFMKGTEAzMT3w_Ig5_4Q7IZtoM_wdUUIvUC_fPgaRPi7PoudeJ37pWLw/exec";

// ======================== 商品数据（与后端映射一致） ========================
const cookedProducts = [
  { 
    name: "猪肉碎肉干 Pork Meat (Minced Meat)", 
    price500: 55, price1kg: 108,
    productName500: "猪肉碎肉干 Pork Meat (Minced Meat) 500G",
    productName1kg: "猪肉碎肉干 Pork Meat (Minced Meat) 1KG"
  },
  { 
    name: "鸡肉碎肉干 Chicken Meat (Minced Meat)", 
    price500: 55, price1kg: 108,
    productName500: "鸡肉碎肉干 Chicken Meat (Minced Meat) 500G",
    productName1kg: "鸡肉碎肉干 Chicken Meat (Minced Meat) 1KG"
  },
  { 
    name: "切片肉干 BBQ Sliced Pork Meat", 
    price500: 70, price1kg: 138,
    productName500: "切片肉干 BBQ Sliced Pork Meat 500G",
    productName1kg: "切片肉干 BBQ Sliced Pork Meat 1KG"
  },
  { 
    name: "帝王肉干 Signature BBQ Bacon", 
    price500: 95, price1kg: 188,
    productName500: "帝王肉干 Signature BBQ Bacon 500G",
    productName1kg: "帝王肉干 Signature BBQ Bacon 1KG"
  },
  { 
    name: "精品肉松 Pork Floss", 
    price: 30, unit: "200G/Tin", isFixed: true,
    productName: "精品肉松 Pork Floss (200G/Tin)"
  },
  { 
    name: "黄金辣味虾米卷 Spicy Spring Roll", 
    price: 22, unit: "220G/Tin", isFixed: true,
    productName: "黄金辣味虾米卷 Spicy Spring Roll (220G/Tin)"
  },
  { 
    name: "炭烧鸡蛋饼 Traditional Kuih Kapit", 
    price: 30, unit: "340G/Tin", isFixed: true,
    productName: "炭烧鸡蛋饼 Traditional Kuih Kapit (340G/Tin)"
  },
  { 
    name: "咸蛋鱼皮 Salted Egg Fish Skin", 
    price: 23, unit: "100G/Pkt", isFixed: true,
    productName: "咸蛋鱼皮 Salted Egg Fish Skin (100G/Pkt)"
  },
  { 
    name: "麻辣鱼皮 Mala Fish Skin", 
    price: 23, unit: "100G/Pkt", isFixed: true,
    productName: "麻辣鱼皮 Mala Fish Skin (100G/Pkt)"
  }
];

let stockCache = new Map();
let stockLoading = new Map();

// ======================== 库存查询函数 ========================
async function fetchStock(productName) {
  if (!productName) return null;
  
  if (stockLoading.get(productName)) {
    return stockCache.get(productName);
  }
  
  stockLoading.set(productName, true);
  
  try {
    const url = `${API_URL}?action=getStock&productName=${encodeURIComponent(productName)}`;
    console.log("Fetching stock from:", url);
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    
    if (data.success) {
      const stockInfo = { success: true, stock: data.stock };
      stockCache.set(productName, stockInfo);
      return stockInfo;
    } else {
      return { success: false, stock: 0, error: data.error };
    }
  } catch (error) {
    console.error("库存查询失败:", error);
    document.getElementById("apiError").style.display = "block";
    return { success: false, stock: 0, error: error.toString() };
  } finally {
    stockLoading.set(productName, false);
  }
}

function getStockDisplayClass(stock) {
  if (stock === null || stock === undefined) return "loading";
  if (stock <= 0) return "out";
  if (stock <= 10) return "low";
  if (stock <= 30) return "medium";
  return "high";
}

function getStockDisplayText(stock, isLoading) {
  if (isLoading) return "⏳ 查询中...";
  if (stock === null || stock === undefined) return "❓ 无法获取";
  if (stock <= 0) return "❌ 缺货";
  if (stock <= 10) return `⚠️ 仅剩 ${stock} 个`;
  return `✅ 库存 ${stock} 个`;
}

async function refreshStock(productName, elementId) {
  const stockInfo = await fetchStock(productName);
  const stockElem = document.getElementById(elementId);
  if (stockElem) {
    const isLoading = stockLoading.get(productName);
    const stockNum = stockInfo?.success ? stockInfo.stock : null;
    const displayClass = getStockDisplayClass(stockNum);
    const displayText = getStockDisplayText(stockNum, isLoading);
    stockElem.className = `stock-display ${displayClass}`;
    stockElem.innerHTML = `📊 ${displayText}`;
    updateQtyInputsStatus(productName, stockNum);
  }
  return stockInfo;
}

function updateQtyInputsStatus(productName, stock) {
  const isOutOfStock = !stock || stock <= 0;
  document.querySelectorAll(`[data-product-name="${productName}"]`).forEach(input => {
    if (isOutOfStock) {
      input.disabled = true;
      input.value = "0";
    } else {
      input.disabled = false;
    }
  });
  document.querySelectorAll(`[data-product-btn="${productName}"]`).forEach(btn => {
    btn.disabled = isOutOfStock;
  });
}

async function refreshAllStock() {
  const refreshBtn = document.querySelector(".refresh-stock");
  const originalText = refreshBtn.innerHTML;
  refreshBtn.innerHTML = "⏳ 刷新中...";
  
  const promises = [];
  cookedProducts.forEach((p, i) => {
    if (p.isFixed && p.productName) {
      promises.push(refreshStock(p.productName, `stock_${i}`));
    } else {
      if (p.productName500) {
        promises.push(refreshStock(p.productName500, `stock_${i}_500`));
      }
      if (p.productName1kg) {
        promises.push(refreshStock(p.productName1kg, `stock_${i}_1kg`));
      }
    }
  });
  
  await Promise.all(promises);
  refreshBtn.innerHTML = originalText;
  calc();
}

function changeQty(elementId, delta, productName) {
  let input = document.getElementById(elementId);
  if (input && !input.disabled) {
    let newVal = (parseInt(input.value) || 0) + delta;
    if (newVal < 0) newVal = 0;
    
    const stockInfo = stockCache.get(productName);
    const maxStock = stockInfo?.success ? stockInfo.stock : 999;
    if (maxStock !== undefined && newVal > maxStock) {
      alert(`⚠️ 库存不足，最多可选 ${maxStock} 个`);
      newVal = maxStock;
    }
    input.value = newVal;
    calc();
  }
}

// ======================== 渲染商品列表 ========================
function renderCookedProducts() {
  let html = "";
  cookedProducts.forEach((p, i) => {
    if (p.isFixed) {
      const stockInfo = stockCache.get(p.productName);
      const stockNum = stockInfo?.success ? stockInfo.stock : null;
      const isLoading = stockLoading.get(p.productName);
      const displayClass = getStockDisplayClass(stockNum);
      const displayText = getStockDisplayText(stockNum, isLoading);
      
      html += `<div class="product-card">
        <div class="product-header">
          <span class="product-name">
            📦 ${p.name}
            <span class="stock-display ${displayClass}" id="stock_${i}">📊 ${displayText}</span>
          </span>
          <span class="product-price">RM${p.price} / ${p.unit}</span>
        </div>
        <div class="qty-group">
          <button data-product-btn="${p.productName}" onclick="changeQty('cooked_${i}', -1, '${p.productName}')" ${(!stockNum || stockNum <= 0) ? 'disabled' : ''}>−</button>
          <input type="number" id="cooked_${i}" value="0" min="0" step="1" onchange="calc()" data-product-name="${p.productName}" ${(!stockNum || stockNum <= 0) ? 'disabled' : ''}>
          <button data-product-btn="${p.productName}" onclick="changeQty('cooked_${i}', 1, '${p.productName}')" ${(!stockNum || stockNum <= 0) ? 'disabled' : ''}>+</button>
        </div>
      </div>`;
    } else {
      const stock500 = stockCache.get(p.productName500);
      const stock1kg = stockCache.get(p.productName1kg);
      const stockNum500 = stock500?.success ? stock500.stock : null;
      const stockNum1kg = stock1kg?.success ? stock1kg.stock : null;
      const isLoading500 = stockLoading.get(p.productName500);
      const isLoading1kg = stockLoading.get(p.productName1kg);
      const displayClass500 = getStockDisplayClass(stockNum500);
      const displayClass1kg = getStockDisplayClass(stockNum1kg);
      const displayText500 = getStockDisplayText(stockNum500, isLoading500);
      const displayText1kg = getStockDisplayText(stockNum1kg, isLoading1kg);
      
      html += `<div class="product-card">
        <div class="product-header">
          <span class="product-name">🥩 ${p.name}</span>
          <span class="product-price">500G RM${p.price500} | 1KG RM${p.price1kg}</span>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:12px; margin-top:6px;">
          <div class="qty-group">
            <span style="font-weight:600;">500G</span>
            <span class="stock-display ${displayClass500}" style="font-size:10px;" id="stock_${i}_500">${displayText500}</span>
            <button data-product-btn="${p.productName500}" onclick="changeQty('cooked_${i}_500', -1, '${p.productName500}')" ${(!stockNum500 || stockNum500 <= 0) ? 'disabled' : ''}>−</button>
            <input type="number" id="cooked_${i}_500" value="0" min="0" onchange="calc()" data-product-name="${p.productName500}" ${(!stockNum500 || stockNum500 <= 0) ? 'disabled' : ''}>
            <button data-product-btn="${p.productName500}" onclick="changeQty('cooked_${i}_500', 1, '${p.productName500}')" ${(!stockNum500 || stockNum500 <= 0) ? 'disabled' : ''}>+</button>
          </div>
          <div class="qty-group">
            <span style="font-weight:600;">1KG</span>
            <span class="stock-display ${displayClass1kg}" style="font-size:10px;" id="stock_${i}_1kg">${displayText1kg}</span>
            <button data-product-btn="${p.productName1kg}" onclick="changeQty('cooked_${i}_1kg', -1, '${p.productName1kg}')" ${(!stockNum1kg || stockNum1kg <= 0) ? 'disabled' : ''}>−</button>
            <input type="number" id="cooked_${i}_1kg" value="0" min="0" onchange="calc()" data-product-name="${p.productName1kg}" ${(!stockNum1kg || stockNum1kg <= 0) ? 'disabled' : ''}>
            <button data-product-btn="${p.productName1kg}" onclick="changeQty('cooked_${i}_1kg', 1, '${p.productName1kg}')" ${(!stockNum1kg || stockNum1kg <= 0) ? 'disabled' : ''}>+</button>
          </div>
        </div>
      </div>`;
    }
  });
  document.getElementById("cookedProducts").innerHTML = html;
}

// ======================== 计算总价和运费 ========================
function calc() {
  let total = 0;
  let weight = 0;
  cookedProducts.forEach((p, i) => {
    if (p.isFixed) {
      let qty = parseInt(document.getElementById(`cooked_${i}`)?.value) || 0;
      total += qty * p.price;
      if (p.name.includes("肉松")) weight += qty * 0.2;
      else if (p.name.includes("虾米卷")) weight += qty * 0.22;
      else if (p.name.includes("鸡蛋饼")) weight += qty * 0.34;
      else if (p.name.includes("鱼皮")) weight += qty * 0.1;
    } else {
      let qty500 = parseInt(document.getElementById(`cooked_${i}_500`)?.value) || 0;
      let qty1kg = parseInt(document.getElementById(`cooked_${i}_1kg`)?.value) || 0;
      total += qty500 * p.price500 + qty1kg * p.price1kg;
      weight += qty500 * 0.5 + qty1kg * 1;
    }
  });
  let ship = 0;
  let delivery = document.getElementById("delivery").value;
  if (delivery === "邮寄") {
    if (weight <= 1) ship = 10;
    else if (weight <= 3) ship = 15;
    else if (weight <= 5) ship = 20;
    else ship = 20 + Math.ceil((weight - 5) / 1) * 5;
  }
  document.getElementById("productTotal").innerText = total.toFixed(2);
  document.getElementById("shipping").innerText = ship.toFixed(2);
  document.getElementById("total").innerText = (total + ship).toFixed(2);
}

// ======================== 提交前检查库存 ========================
async function checkAllStockBeforeSubmit() {
  let itemsToCheck = [];
  cookedProducts.forEach((p, i) => {
    if (p.isFixed) {
      let qty = parseInt(document.getElementById(`cooked_${i}`)?.value) || 0;
      if (qty > 0 && p.productName) {
        const stockInfo = stockCache.get(p.productName);
        itemsToCheck.push({ productName: p.productName, name: p.name, qty: qty, stock: stockInfo?.stock || 0 });
      }
    } else {
      let qty500 = parseInt(document.getElementById(`cooked_${i}_500`)?.value) || 0;
      let qty1kg = parseInt(document.getElementById(`cooked_${i}_1kg`)?.value) || 0;
      if (qty500 > 0 && p.productName500) {
        const stockInfo = stockCache.get(p.productName500);
        itemsToCheck.push({ productName: p.productName500, name: `${p.name} 500G`, qty: qty500, stock: stockInfo?.stock || 0 });
      }
      if (qty1kg > 0 && p.productName1kg) {
        const stockInfo = stockCache.get(p.productName1kg);
        itemsToCheck.push({ productName: p.productName1kg, name: `${p.name} 1KG`, qty: qty1kg, stock: stockInfo?.stock || 0 });
      }
    }
  });
  
  for (let item of itemsToCheck) {
    if (item.stock < item.qty) {
      alert(`❌ ${item.name}\n需求数量：${item.qty}\n剩余库存：${item.stock}\n\n库存不足！`);
      return false;
    }
  }
  return true;
}

// ======================== 提交订单 ========================
let submittingFlag = false;

async function submitOrder() {
  if (submittingFlag) return;
  
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();
  
  if (!name || !phone || !address) {
    alert("请完整填写姓名、电话、地址");
    return;
  }
  const phoneRegex = /^[0-9]{9,11}$/;
  if (!phoneRegex.test(phone)) {
    alert("请填写正确的手机号码 (9-11位数字)");
    return;
  }
  
  const file = document.getElementById("payment").files[0];
  if (!file) {
    alert("请上传付款截图");
    return;
  }
  if (file.size > 2 * 1024 * 1024) {
    alert("图片不能超过2MB");
    return;
  }
  
  const stockOk = await checkAllStockBeforeSubmit();
  if (!stockOk) return;
  
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> 提交订单中...';
  submittingFlag = true;
  
  let orderProducts = [];
  cookedProducts.forEach((p, i) => {
    if (p.isFixed) {
      let qty = parseInt(document.getElementById(`cooked_${i}`)?.value) || 0;
      if (qty > 0) orderProducts.push({ name: p.productName, qty: qty, price: p.price });
    } else {
      let qty500 = parseInt(document.getElementById(`cooked_${i}_500`)?.value) || 0;
      let qty1kg = parseInt(document.getElementById(`cooked_${i}_1kg`)?.value) || 0;
      if (qty500 > 0) orderProducts.push({ name: p.productName500, qty: qty500, price: p.price500 });
      if (qty1kg > 0) orderProducts.push({ name: p.productName500, qty: qty1kg, price: p.price1kg });
    }
  });
  
  const reader = new FileReader();
  reader.onload = async function(evt) {
    try {
      const payload = {
        name: name,
        phone: phone,
        address: address,
        delivery: document.getElementById("delivery").value,
        remark: document.getElementById("remark").value,
        products: orderProducts,
        productTotal: document.getElementById("productTotal").innerText,
        shippingFee: document.getElementById("shipping").innerText,
        total: document.getElementById("total").innerText,
        paymentImage: evt.target.result,
        freeGifts: ""
      };
      
      const fetchRes = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const response = await fetchRes.json();
      
      if (response.status === "success") {
        document.body.innerHTML = `<div style="max-width:600px; margin:50px auto; text-align:center; background:white; border-radius:28px; padding:32px;">
          <h2 style="color:#b33c1c;">🎉 下单成功！</h2>
          <p>订单编号：<strong style="font-size:20px;">${response.orderId}</strong></p>
          <p>我们会尽快处理您的订单</p>
          <p style="font-size:13px; color:#a16241;">请保留订单号以备查询</p>
          <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; background:#b33c1c; color:white; border:none; border-radius:20px;">继续下单</button>
        </div>`;
      } else {
        alert("提交失败：" + (response.message || "未知错误"));
        btn.disabled = false;
        btn.innerHTML = "📦 提交订单";
        submittingFlag = false;
      }
    } catch (err) {
      alert("网络错误：" + err.message);
      btn.disabled = false;
      btn.innerHTML = "📦 提交订单";
      submittingFlag = false;
    }
  };
  
  reader.onerror = function() {
    alert("读取图片失败");
    btn.disabled = false;
    btn.innerHTML = "📦 提交订单";
    submittingFlag = false;
  };
  
  reader.readAsDataURL(file);
}

// ======================== 初始化 ========================
function init() {
  renderCookedProducts();
  refreshAllStock();
}

document.getElementById("delivery").addEventListener("change", calc);
document.getElementById("submitBtn").onclick = submitOrder;
init();
</script>
</body>
</html>
